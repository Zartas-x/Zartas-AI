name: Build Zartas-AI 19.1
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev zip unzip autoconf libtool pkg-config libncurses5-dev libncursesw5-dev libffi-dev libssl-dev
          pip install --upgrade pip setuptools "cython<3.0" buildozer

      - name: Build with Buildozer
        run: |
          # Мы не трогаем buildozer.spec через sed! 
          # Он будет использоваться ровно так, как ты его настроишь.
          export CPATH=""
          export LIBRARY_PATH=""
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Zartas-AI-19.1-APK
          path: bin/*.apk

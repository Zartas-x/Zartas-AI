name: Build Zartas-AI Ultra
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev zip unzip autoconf libtool libltdl-dev m4 pkg-config
          pip install --upgrade pip setuptools 
          pip install "cython<3.0" buildozer

      - name: Build with Buildozer
        run: |
          # 1. Инициализация
          [ -f buildozer.spec ] || buildozer init
          
          # 2. Настройка конфига
          sed -i 's/^android.permissions = .*/android.permissions = INTERNET, CAMERA, VIBRATE, READ_EXTERNAL_STORAGE, WRITE_EXTERNAL_STORAGE, RECORD_AUDIO, ACCESS_FINE_LOCATION, ACCESS_COARSE_LOCATION, FLASHLIGHT, CALL_PHONE, SEND_SMS/' buildozer.spec
          sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/^requirements = .*/requirements = python3==3.10.12,kivy==2.3.0,plyer,requests,urllib3/' buildozer.spec
          sed -i 's/# android.ndk = 25b/android.ndk = 25b/' buildozer.spec
          
          # 3. ФИКС ОШИБКИ LT_SYS_SYMBOL_USCORE
          # Мы принудительно обновляем пути к макросам libtool
          export ACLOCAL_PATH=/usr/share/aclocal
          
          # 4. Сборка
          buildozer -v android debug
          
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Zartas-AI-Final-APK
          path: bin/*.apk

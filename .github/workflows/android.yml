name: Build Zartas-AI Ultra
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04  # Используем 22.04, она стабильнее для Buildozer
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev zip unzip autoconf libtool pkg-config libncurses5-dev libncursesw5-dev libffi-dev libssl-dev
          pip install --upgrade pip setuptools "cython<3.0" buildozer

      - name: Build with Buildozer
        run: |
          # Полная очистка перед стартом
          rm -rf .buildozer
          [ -f buildozer.spec ] || buildozer init
          
          # Настройка конфига
          sed -i 's/^android.permissions = .*/android.permissions = INTERNET, CAMERA, VIBRATE, READ_EXTERNAL_STORAGE, WRITE_EXTERNAL_STORAGE, RECORD_AUDIO, ACCESS_FINE_LOCATION, ACCESS_COARSE_LOCATION, FLASHLIGHT, CALL_PHONE, SEND_SMS/' buildozer.spec
          sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          # Фикс требований: добавляем только необходимое
          sed -i 's/^requirements = .*/requirements = python3,kivy==2.3.0,plyer,requests/' buildozer.spec
          
          # ЗАПРЕЩАЕМ использовать системные пути (лечит твои 20 ошибок)
          export CPATH=""
          export LIBRARY_PATH=""
          
          buildozer -v android debug
          
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Zartas-AI-Final-APK
          path: bin/*.apk

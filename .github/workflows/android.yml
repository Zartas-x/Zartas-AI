name: Build Zartas-AI Full Access
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev openjdk-17-jdk zip unzip
          pip install --upgrade pip setuptools
          pip install buildozer cython==0.29.33

      - name: Build with Buildozer
        run: |
          export JAVA_HOME=$JAVA_HOME_17_X64
          export PATH=$PATH:$JAVA_HOME/bin
          
          # Инициализация
          buildozer init
          
          # Настройка прав и параметров (теперь более компактно)
          sed -i 's/# android.permissions = .*/android.permissions = INTERNET, CAMERA, VIBRATE, READ_EXTERNAL_STORAGE, WRITE_EXTERNAL_STORAGE, RECORD_AUDIO, ACCESS_FINE_LOCATION, ACCESS_COARSE_LOCATION, FLASHLIGHT, CALL_PHONE, SEND_SMS/' buildozer.spec
          sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/android.api = 31/android.api = 33/' buildozer.spec
          
          # Фикс для GitHub Actions (используем локальную папку)
          sed -i 's/# android.sdk_path =/android.sdk_path = .\/sdk/' buildozer.spec
          sed -i 's/# android.ndk_path =/android.ndk_path = .\/ndk/' buildozer.spec

          # ЗАПУСК: Сначала чистка, потом сборка
          buildozer android clean
          yes | buildozer -v android debug
          
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Zartas-AI-Power-App
          path: bin/*.apk

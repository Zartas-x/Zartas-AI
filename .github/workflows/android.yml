name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev openjdk-17-jdk zip unzip
          pip install --upgrade pip setuptools
          pip install buildozer cython==0.29.33

      - name: Build with Buildozer
        run: |
          # 1. Настройка окружения
          export JAVA_HOME=$JAVA_HOME_17_X64
          export PATH=$PATH:$JAVA_HOME/bin
          
          # 2. Инициализация (если файла нет)
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi

          # 3. КРИТИЧЕСКИЙ МОМЕНТ: 
          # Мы используем 'yes', чтобы отвечать на вопросы внутри самого процесса сборки.
          # Также отключаем попытки Buildozer использовать старый путь к лицензиям.
          yes | buildozer -v android debug
          
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Zartas-Installer
          path: bin/*.apk

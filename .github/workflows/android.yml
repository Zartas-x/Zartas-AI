name: Build Zartas-AI Ultra
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev zip unzip
          pip install --upgrade pip setuptools 
          pip install "cython<3.0"
          pip install buildozer

      - name: Build with Buildozer
        run: |
          # 1. Чистим всё старое, чтобы не было конфликтов путей
          rm -rf .buildozer
          
          # 2. Создаем конфиг, если его нет
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi
          
          # 3. Настройка разрешений и версий
          sed -i 's/^android.permissions = .*/android.permissions = INTERNET, CAMERA, VIBRATE, READ_EXTERNAL_STORAGE, WRITE_EXTERNAL_STORAGE, RECORD_AUDIO, ACCESS_FINE_LOCATION, ACCESS_COARSE_LOCATION, FLASHLIGHT, CALL_PHONE, SEND_SMS/' buildozer.spec
          sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/^requirements = .*/requirements = python3==3.10.12,kivy==2.3.0,plyer/' buildozer.spec
          
          # 4. МАГИЯ: Принудительно устанавливаем p4a перед билдом
          # Это создаст ту самую недостающую папку
          buildozer android p4a -- version || true
          
          # 5. Запуск сборки
          yes | buildozer -v android debug
          
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Zartas-AI-Final-APK
          path: bin/*.apk

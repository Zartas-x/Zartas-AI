name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev openjdk-17-jdk zip unzip
          pip install --upgrade pip setuptools
          pip install buildozer cython==0.29.33

      - name: Build with Buildozer
        run: |
          # 1. Принудительно устанавливаем переменные окружения для Java
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$PATH:$JAVA_HOME/bin
          
          # 2. Создаем лицензии заранее (чтобы не было вопросов)
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb7437c302a91464830a\n263b06347e830d3411994339384198357994f811" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          
          # 3. Инициализируем конфиг, если его нет
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi

          # 4. Запуск сборки с полным выводом логов
          buildozer -v android debug
          
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Zartas-Installer
          path: bin/*.apk

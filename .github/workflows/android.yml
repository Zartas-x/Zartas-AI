name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev openjdk-17-jdk
          pip install --upgrade pip setuptools
          pip install buildozer cython==0.29.33

      - name: Build with Buildozer
        run: |
          # 1. Явно указываем путь к Java (это решает 90% проблем)
          export JAVA_HOME=$JAVA_HOME_17_X64
          
          # 2. Инициализируем buildozer
          buildozer android help
          
          # 3. Принимаем лицензии ДО основной сборки
          # Создаем файл-заглушку, который говорит Google "всё подписано"
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb7437c302a91464830a\n263b06347e830d3411994339384198357994f811" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          
          # 4. Запускаем сборку
          buildozer -v android debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Zartas-Installer
          path: bin/*.apk
